    <line x1="80" y1="22" x2="58" y2="46" stroke="#F5F0EB" stroke-width="6.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(245, 240, 235);color:rgb(255, 255, 255);stroke-width:6.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="58" y1="46" x2="80" y2="66" stroke="#F5F0EB" stroke-width="6.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(245, 240, 235);color:rgb(255, 255, 255);stroke-width:6.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="80" y1="46" x2="58" y2="66" stroke="#F5F0EB" stroke-width="6.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(245, 240, 235);color:rgb(255, 255, 255);stroke-width:6.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
